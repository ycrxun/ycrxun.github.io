<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>如何快速赚钱？</title>
    <style>
        .text-editor-wrap {
            display: block;
            margin: auto;
            max-width: 530px;
            border-radius: 10px;
            box-shadow: rgb(0 0 0 / 80%) 0px 20px 70px;
            clear: both;
            overflow: hidden;
            -webkit-transition: all 0.5s ease-out;
            -moz-transition: all 0.5s ease-out;
            -ms-transition: all 0.5s ease-out;
            -o-transition: all 0.5s ease-out;
            transition: all 0.5s ease-out;
        }
        .title-bar {
            padding: 5px 0;
            font-family: "Lucida Grande", sans-serif;
            font-size: 0.75em;
            text-align: center;
            text-shadow: rgb(255 255 255 / 80%) 0px 1px 0px;
            background-color: #f8f8f8;
            background-image: -webkit-linear-gradient(top, #e8e8e8, #bcbbbc);
            background-image: -moz-linear-gradient(top, #e8e8e8, #bcbbbc);
            background-image: linear-gradient(top, #e8e8e8, #bcbbbc);
            box-shadow: inset rgb(255 255 255 / 70%) 0px 1px 1px;
            border-bottom: #6a6a6a 1px solid;
        }

        .shift-text .text-body {
            height: 120px;
        }
        .text-body {
            height: 250px;
            background-color: rgba(0, 0, 0, 0.85);
            padding: 10px;
            color: #f0f0f0;
            text-shadow: #000 0px 1px 0px;
            font-family: "Consolas", "Courier New", "Courier";
            font-size: 1.45em;
            line-height: 1.40em;
            font-weight: 500;
            text-align: left;
            overflow: hidden;
            -webkit-transition: all 0.5s ease-out;
            -moz-transition: all 0.5s ease-out;
            -ms-transition: all 0.5s ease-out;
            -o-transition: all 0.5s ease-out;
            transition: all 0.5s ease-out;
        }
        .title-bar {
            padding: 5px 0;
            font-family: "Lucida Grande", sans-serif;
            font-size: 0.75em;
            text-align: center;
            text-shadow: rgb(255 255 255 / 80%) 0px 1px 0px;
            background-color: #f8f8f8;
            background-image: -webkit-linear-gradient(top, #e8e8e8, #bcbbbc);
            background-image: -moz-linear-gradient(top, #e8e8e8, #bcbbbc);
            background-image: linear-gradient(top, #e8e8e8, #bcbbbc);
            box-shadow: inset rgb(255 255 255 / 70%) 0px 1px 1px;
            border-bottom: #6a6a6a 1px solid;
        }

    </style>
</head>
<body>
<div class="text-editor-wrap">
    <div class="title-bar"><span class="title">typed.js — bash — 80x<span class="terminal-height">10</span></span></div>
    <div class="text-body">
        $ <span id="typed">如何快速赚钱？</span>
        <span class="typed-cursor">|</span>
    </div>
</div>
<div class="element"></div>

<script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
<script>
  var options = {
    strings: ['首先', '你要先睡觉','然后','做梦'],
    typeSpeed: 60
  };

  var typed = new Typed('.typed-cursor', options);
</script>
</body>
</html>
